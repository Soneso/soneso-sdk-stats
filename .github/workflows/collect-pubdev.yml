name: Collect pub.dev Stats

on:
  schedule:
    - cron: '10 10 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: pubdev-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch and merge pub.dev data
        run: |
          python3 <<'PYTHON'
          import json
          import os
          import urllib.request
          from datetime import datetime, timedelta, timezone

          PACKAGES = {
              "stellar_flutter_sdk": "stellar_flutter_sdk",
          }

          today = datetime.now(timezone.utc).date().isoformat()

          for package, folder in PACKAGES.items():
              try:
                  # Fetch metrics (includes score + weekly downloads)
                  url = f"https://pub.dev/api/packages/{package}/metrics"
                  req = urllib.request.Request(url, headers={"User-Agent": "soneso-sdk-stats/1.0"})
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      raw = resp.read().decode()

                  try:
                      api_data = json.loads(raw)
                  except json.JSONDecodeError as e:
                      print(f"::warning::Invalid JSON from pub.dev API for {package}: {e}")
                      continue

                  score = api_data.get("score")
                  if not score or "downloadCount30Days" not in score:
                      print(f"::warning::Unexpected API response structure for {package}")
                      continue

                  download_count_30d = score["downloadCount30Days"]

                  # Extract weekly downloads if available (inside scorecard)
                  weekly_downloads = None
                  scorecard = api_data.get("scorecard", {})
                  wvd = scorecard.get("weeklyVersionDownloads", {})
                  raw_weekly = wvd.get("totalWeeklyDownloads")
                  if isinstance(raw_weekly, list) and all(isinstance(x, (int, float)) for x in raw_weekly):
                      weekly_downloads = raw_weekly
                  elif raw_weekly is not None:
                      print(f"::warning::Unexpected type for totalWeeklyDownloads in {package}: {type(raw_weekly)}")

                  # Load existing data
                  json_path = os.path.join(folder, "pub-dev.json")
                  existing = {}
                  if os.path.exists(json_path):
                      try:
                          with open(json_path) as f:
                              old_data = json.load(f)
                          for entry in old_data.get("daily", []):
                              existing[entry["date"]] = entry
                      except (json.JSONDecodeError, KeyError) as e:
                          print(f"::warning::Corrupt data file for {package}, starting fresh: {e}")
                          existing = {}

                  # Add today's snapshot
                  existing[today] = {
                      "date": today,
                      "download_count_30d": download_count_30d,
                  }

                  # Sort by date descending (most recent first)
                  merged = sorted(existing.values(), key=lambda x: x["date"], reverse=True)

                  latest = {
                      "download_count_30d": download_count_30d,
                  }

                  # Build weekly entries from newest-first download counts
                  weekly_entries = []
                  if weekly_downloads is not None:
                      newest_date_str = wvd.get("newestDate", "")[:10]
                      if newest_date_str:
                          try:
                              newest_date = datetime.strptime(newest_date_str, "%Y-%m-%d").date()
                          except ValueError:
                              print(f"::warning::Invalid newestDate format '{newest_date_str}' for {package}")
                              newest_date = None
                          if newest_date:
                              for i, count in enumerate(weekly_downloads):
                                  week_date = newest_date - timedelta(weeks=i)
                                  iso_year, iso_week, _ = week_date.isocalendar()
                                  weekly_entries.append({
                                      "week": f"{iso_week:02d} ({iso_year})",
                                      "download_count": count,
                                  })
                              if len(weekly_downloads) >= 4:
                                  latest["download_count_4w"] = sum(weekly_downloads[:4])
                              if len(weekly_downloads) >= 12:
                                  latest["download_count_12w"] = sum(weekly_downloads[:12])
                              if len(weekly_downloads) >= 52:
                                  latest["download_count_52w"] = sum(weekly_downloads[:52])

                  result_data = {
                      "schema_version": 2,
                      "latest": latest,
                      "weekly": weekly_entries,
                      "daily": merged,
                  }

                  os.makedirs(folder, exist_ok=True)
                  tmp_path = os.path.join(folder, ".pub-dev.tmp")
                  with open(tmp_path, "w") as f:
                      json.dump(result_data, f, indent=2)
                      f.write("\n")
                  os.replace(tmp_path, json_path)

                  days_tracked = len(merged)
                  weeks_tracked = len(weekly_entries)
                  print(f"{folder}: {download_count_30d} downloads (30d), {weeks_tracked} weeks of history | {days_tracked} days tracked")

              except Exception as e:
                  print(f"::warning::Failed to process {package}: {e}")
                  continue
          PYTHON

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add */pub-dev.json
          git diff --staged --quiet && echo "No changes" && exit 0
          today=$(date -u +%Y-%m-%d)
          git commit -m "Update pub.dev data ${today}"
          for i in 1 2 3; do
            if git pull --rebase; then
              git push && exit 0
            else
              echo "::warning::Rebase failed (possible conflict), aborting rebase"
              git rebase --abort 2>/dev/null || true
            fi
            echo "::warning::Push attempt $i failed, retrying..."
            sleep 5
          done
          echo "::error::Failed to push after 3 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        run: echo "::warning::pub.dev collection failed. Check the workflow logs."
