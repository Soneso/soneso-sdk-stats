name: Collect GitHub Dependents Stats

on:
  schedule:
    - cron: '35 10 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: github-dependents-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch and merge GitHub dependents data
        run: |
          python3 <<'PYTHON'
          # This workflow scrapes GitHub's dependents HTML page to extract
          # "Used by" counts. It is inherently fragile — if GitHub changes
          # the page layout, the regex will stop matching. The parse_error
          # flag and 7-day staleness check ensure broken scraping is noticed.

          import json
          import os
          import re
          import subprocess
          from datetime import datetime, timedelta, timezone

          REPOS = {
              "Soneso/stellar-ios-mac-sdk": "stellar-ios-mac-sdk",
              "Soneso/stellar_flutter_sdk": "stellar_flutter_sdk",
              "Soneso/stellar-php-sdk": "stellar-php-sdk",
              "Soneso/kmp-stellar-sdk": "kmp-stellar-sdk",
          }

          today = datetime.now(timezone.utc).date()
          today_str = today.isoformat()
          staleness_cutoff = today - timedelta(days=7)

          stale_repos = []

          for repo, folder in REPOS.items():
              try:
                  url = f"https://github.com/{repo}/network/dependents"
                  result = subprocess.run(
                      ["curl", "-sL", "-H", "User-Agent: soneso-sdk-stats/1.0", url],
                      capture_output=True, text=True, timeout=30
                  )
                  if result.returncode != 0:
                      print(f"::warning::curl failed for {repo}: exit {result.returncode}")
                      continue

                  html = result.stdout
                  repo_match = re.search(
                      r'href="[^"]*network/dependents\?dependent_type=REPOSITORY"[^>]*>.*?'
                      r'([\d,]+)\s+Repositories',
                      html, re.DOTALL
                  )
                  pkg_match = re.search(
                      r'href="[^"]*network/dependents\?dependent_type=PACKAGE"[^>]*>.*?'
                      r'([\d,]+)\s+Packages',
                      html, re.DOTALL
                  )

                  repo_count = int(repo_match.group(1).replace(",", "")) if repo_match else None
                  pkg_count = int(pkg_match.group(1).replace(",", "")) if pkg_match else None

                  new_entry = {
                      "date": today_str,
                      "dependent_repos": repo_count,
                      "dependent_packages": pkg_count,
                  }

                  if repo_count is None and pkg_count is None:
                      new_entry["parse_error"] = True
                      print(f"::warning::Parse failed for {repo} — HTML structure may have changed")

                  # Load existing data
                  json_path = os.path.join(folder, "github-dependents.json")
                  existing_data = {}
                  if os.path.exists(json_path):
                      try:
                          with open(json_path) as f:
                              existing_data = json.load(f)
                      except (json.JSONDecodeError, KeyError) as e:
                          print(f"::warning::Corrupt data file for {repo}, starting fresh: {e}")
                          existing_data = {}

                  # Merge by date
                  existing_daily = {}
                  for entry in existing_data.get("daily", []):
                      existing_daily[entry["date"]] = entry
                  existing_daily[today_str] = new_entry

                  daily_list = sorted(
                      existing_daily.values(),
                      key=lambda x: x["date"],
                      reverse=True,
                  )

                  result_data = {
                      "schema_version": 1,
                      "daily": daily_list,
                  }

                  # Write atomically
                  os.makedirs(folder, exist_ok=True)
                  tmp_path = os.path.join(folder, ".github-dependents.tmp")
                  with open(tmp_path, "w") as f:
                      json.dump(result_data, f, indent=2)
                      f.write("\n")
                  os.replace(tmp_path, json_path)

                  # Check staleness: find most recent successful entry
                  last_success = None
                  for entry in daily_list:
                      if entry.get("dependent_repos") is not None:
                          last_success = entry["date"]
                          break
                  if last_success is None or last_success < str(staleness_cutoff):
                      stale_repos.append(folder)

                  repo_str = repo_count if repo_count is not None else "?"
                  pkg_str = pkg_count if pkg_count is not None else "?"
                  print(f"{folder}: {repo_str} dependent repos, {pkg_str} dependent packages")

              except Exception as e:
                  print(f"::warning::Failed to process {repo}: {e}")
                  continue

          if stale_repos:
              print(f"::error::Dependents scraping stale (>7 days) for: {', '.join(stale_repos)}")
          PYTHON

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add */github-dependents.json
          git diff --staged --quiet && echo "No changes" && exit 0
          today=$(date -u +%Y-%m-%d)
          git commit -m "Update github-dependents data ${today}"
          for i in 1 2 3; do
            if git pull --rebase; then
              git push && exit 0
            else
              echo "::warning::Rebase failed (possible conflict), aborting rebase"
              git rebase --abort 2>/dev/null || true
            fi
            echo "::warning::Push attempt $i failed, retrying..."
            sleep 5
          done
          echo "::error::Failed to push after 3 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        run: echo "::warning::GitHub dependents collection failed. Check the workflow logs."
