name: Collect GitHub Issues Stats

on:
  schedule:
    - cron: '30 10 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: github-issues-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch and merge GitHub issues data
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: |
          python3 <<'PYTHON'
          import json
          import os
          import statistics
          import subprocess
          import time
          from datetime import datetime, timedelta, timezone

          REPOS = {
              "Soneso/stellar-ios-mac-sdk": "stellar-ios-mac-sdk",
              "Soneso/stellar_flutter_sdk": "stellar_flutter_sdk",
              "Soneso/stellar-php-sdk": "stellar-php-sdk",
              "Soneso/kmp-stellar-sdk": "kmp-stellar-sdk",
          }

          MAINTAINER_ROLES = {"OWNER", "MEMBER", "COLLABORATOR"}
          SELF_FILED_ROLES = {"OWNER", "MEMBER"}
          ISSUE_CAP = 500

          today = datetime.now(timezone.utc)
          today_str = today.date().isoformat()
          since_date = (today - timedelta(days=365)).date().isoformat()
          cutoff_365d = since_date

          def parse_dt(s):
              if not s:
                  return None
              return datetime.fromisoformat(s.replace("Z", "+00:00"))

          def hours_between(start, end):
              if not start or not end:
                  return None
              dt_start = parse_dt(start) if isinstance(start, str) else start
              dt_end = parse_dt(end) if isinstance(end, str) else end
              return round((dt_end - dt_start).total_seconds() / 3600, 1)

          for repo, folder in REPOS.items():
              try:
                  # Load existing data for caching
                  json_path = os.path.join(folder, "github-issues.json")
                  existing_data = {}
                  existing_issues = {}
                  if os.path.exists(json_path):
                      try:
                          with open(json_path) as f:
                              existing_data = json.load(f)
                          for issue in existing_data.get("issues", []):
                              existing_issues[issue["number"]] = issue
                      except (json.JSONDecodeError, KeyError) as e:
                          print(f"::warning::Corrupt data file for {repo}, starting fresh: {e}")

                  # Fetch issues updated in last 365 days
                  result = subprocess.run(
                      [
                          "gh", "api",
                          f"repos/{repo}/issues?state=all&since={since_date}&per_page=100",
                          "--paginate",
                      ],
                      capture_output=True, text=True, timeout=60
                  )
                  if result.returncode != 0:
                      print(f"::warning::Issues API failed for {repo}: {result.stderr}")
                      continue

                  api_issues = json.loads(result.stdout)
                  if len(api_issues) > ISSUE_CAP:
                      print(f"::warning::{repo} has {len(api_issues)} issues, capping at {ISSUE_CAP}")
                      api_issues = api_issues[:ISSUE_CAP]

                  # Process each issue
                  new_issues = {}
                  for item in api_issues:
                      try:
                          number = item["number"]
                          is_pr = "pull_request" in item
                          issue_type = "pr" if is_pr else "issue"

                          created_at = item["created_at"]
                          closed_at = item.get("closed_at")
                          time_to_close = hours_between(created_at, closed_at)

                          entry = {
                              "number": number,
                              "title": item["title"],
                              "type": issue_type,
                              "state": item["state"],
                              "author": (item.get("user") or {}).get("login", "ghost"),
                              "author_association": item.get("author_association", "NONE"),
                              "created_at": created_at,
                              "closed_at": closed_at,
                              "first_response_at": None,
                              "first_response_hours": None,
                              "time_to_close_hours": time_to_close,
                              "labels": [l["name"] for l in item.get("labels", [])],
                          }

                          # Check cache for first_response_at
                          cached = existing_issues.get(number, {})
                          if cached.get("first_response_at"):
                              entry["first_response_at"] = cached["first_response_at"]
                              entry["first_response_hours"] = cached["first_response_hours"]
                          else:
                              # Fetch comments to find first maintainer response
                              try:
                                  time.sleep(0.5)
                                  cr = subprocess.run(
                                      [
                                          "gh", "api",
                                          f"repos/{repo}/issues/{number}/comments?per_page=5",
                                      ],
                                      capture_output=True, text=True, timeout=30
                                  )
                                  if cr.returncode == 0:
                                      comments = json.loads(cr.stdout)
                                      for comment in comments:
                                          if comment.get("author_association") in MAINTAINER_ROLES:
                                              entry["first_response_at"] = comment["created_at"]
                                              entry["first_response_hours"] = hours_between(
                                                  created_at, comment["created_at"]
                                              )
                                              break
                                  else:
                                      print(f"::warning::Comments API failed for {repo}#{number}: {cr.stderr}")
                              except Exception as e:
                                  print(f"::warning::Comments fetch failed for {repo}#{number}: {e}")

                          new_issues[number] = entry
                      except Exception as e:
                          print(f"::warning::Failed to process {repo}#{item.get('number', '?')}: {e}")
                          continue

                  # Merge: preserve old issues not in current API response
                  merged_issues = dict(existing_issues)
                  merged_issues.update(new_issues)

                  # Sort by number descending
                  issues_list = sorted(
                      merged_issues.values(),
                      key=lambda x: x["number"],
                      reverse=True,
                  )

                  # Compute summary
                  open_issues = sum(
                      1 for i in issues_list
                      if i["type"] == "issue" and i["state"] == "open"
                  )
                  open_prs = sum(
                      1 for i in issues_list
                      if i["type"] == "pr" and i["state"] == "open"
                  )
                  closed_issues_365d = sum(
                      1 for i in issues_list
                      if i["type"] == "issue"
                      and i["state"] == "closed"
                      and i.get("closed_at")
                      and i["closed_at"][:10] >= cutoff_365d
                  )
                  closed_prs_365d = sum(
                      1 for i in issues_list
                      if i["type"] == "pr"
                      and i["state"] == "closed"
                      and i.get("closed_at")
                      and i["closed_at"][:10] >= cutoff_365d
                  )

                  # Exclude self-filed issues from response time metrics
                  external = [
                      i for i in issues_list
                      if i.get("author_association") not in SELF_FILED_ROLES
                  ]

                  response_hours = [
                      i["first_response_hours"] for i in external
                      if i.get("first_response_hours") is not None
                  ]
                  # Exclude issues open for more than 5 years from close-time
                  # metrics — stale PRs/issues skew the averages
                  MAX_CLOSE_HOURS = 5 * 365 * 24  # 43800h
                  close_hours = [
                      i["time_to_close_hours"] for i in external
                      if i.get("time_to_close_hours") is not None
                      and i["time_to_close_hours"] <= MAX_CLOSE_HOURS
                  ]
                  external_with_comments = [
                      i for i in external if i.get("first_response_at") is not None
                  ]
                  external_total = len(external)

                  summary = {
                      "as_of": today_str,
                      "open_issues": open_issues,
                      "open_prs": open_prs,
                      "closed_issues_365d": closed_issues_365d,
                      "closed_prs_365d": closed_prs_365d,
                      "median_first_response_hours": (
                          round(statistics.median(response_hours), 1)
                          if response_hours else None
                      ),
                      "avg_first_response_hours": (
                          round(sum(response_hours) / len(response_hours), 1)
                          if response_hours else None
                      ),
                      "median_time_to_close_hours": (
                          round(statistics.median(close_hours), 1)
                          if close_hours else None
                      ),
                      "avg_time_to_close_hours": (
                          round(sum(close_hours) / len(close_hours), 1)
                          if close_hours else None
                      ),
                      "issues_with_response_pct": (
                          round(len(external_with_comments) / external_total * 100, 1)
                          if external_total > 0 else None
                      ),
                  }

                  result_data = {
                      "schema_version": 1,
                      "summary": summary,
                      "issues": issues_list,
                  }

                  # Write atomically
                  os.makedirs(folder, exist_ok=True)
                  tmp_path = os.path.join(folder, ".github-issues.tmp")
                  with open(tmp_path, "w") as f:
                      json.dump(result_data, f, indent=2)
                      f.write("\n")
                  os.replace(tmp_path, json_path)

                  closed_365d = closed_issues_365d + closed_prs_365d
                  median_h = summary["median_first_response_hours"]
                  median_str = f"{median_h}h" if median_h is not None else "n/a"
                  print(f"{folder}: {open_issues} open, {closed_365d} closed (365d), median response {median_str}")

              except Exception as e:
                  print(f"::warning::Failed to process {repo}: {e}")
                  continue
          PYTHON

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add */github-issues.json
          git diff --staged --quiet && echo "No changes" && exit 0
          today=$(date -u +%Y-%m-%d)
          git commit -m "Update github-issues data ${today}"
          for i in 1 2 3; do
            if git pull --rebase; then
              git push && exit 0
            else
              echo "::warning::Rebase failed (possible conflict), aborting rebase"
              git rebase --abort 2>/dev/null || true
            fi
            echo "::warning::Push attempt $i failed, retrying..."
            sleep 5
          done
          echo "::error::Failed to push after 3 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        run: echo "::warning::GitHub issues collection failed. Check the workflow logs."
