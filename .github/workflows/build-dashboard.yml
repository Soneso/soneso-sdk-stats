name: Build Dashboard

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: dashboard-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build dashboard
        run: python3 dashboard/build.py

      - name: Validate dashboard output
        run: |
          if [ ! -s docs/index.html ]; then
            echo "::error::docs/index.html is empty or missing"
            exit 1
          fi
          if ! head -1 docs/index.html | grep -q '<!DOCTYPE html>'; then
            echo "::error::docs/index.html does not start with <!DOCTYPE html>"
            exit 1
          fi
          size=$(wc -c < docs/index.html)
          if [ "$size" -lt 10000 ]; then
            echo "::error::docs/index.html is suspiciously small (${size} bytes)"
            exit 1
          fi
          if ! grep -q 'cdn.jsdelivr.net/npm/echarts' docs/index.html; then
            echo "::error::docs/index.html is missing the ECharts script tag"
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet && echo "No changes" && exit 0
          today=$(date -u +%Y-%m-%d)
          git commit -m "Update dashboard data ${today}"
          for i in 1 2 3; do
            if git pull --rebase; then
              git push && exit 0
            else
              echo "::warning::Rebase failed (possible conflict), aborting rebase"
              git rebase --abort 2>/dev/null || true
            fi
            echo "::warning::Push attempt $i failed, retrying..."
            sleep 5
          done
          echo "::error::Failed to push after 3 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        run: echo "::warning::Dashboard build failed. Check the workflow logs."
