name: Collect Packagist Stats

on:
  schedule:
    - cron: '5 6 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: packagist-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch and merge Packagist data
        run: |
          python3 <<'PYTHON'
          import json
          import os
          import urllib.request
          from datetime import datetime, timezone

          PACKAGES = {
              "soneso/stellar-php-sdk": "stellar-php-sdk",
          }

          today = datetime.now(timezone.utc).date().isoformat()

          for package, folder in PACKAGES.items():
              try:
                  url = f"https://packagist.org/packages/{package}/downloads.json"
                  with urllib.request.urlopen(url, timeout=30) as resp:
                      raw = resp.read().decode()

                  try:
                      api_data = json.loads(raw)
                  except json.JSONDecodeError as e:
                      print(f"::warning::Invalid JSON from Packagist API for {package}: {e}")
                      continue

                  if "package" not in api_data or "downloads" not in api_data.get("package", {}):
                      print(f"::warning::Unexpected API response structure for {package}")
                      continue

                  downloads = api_data["package"]["downloads"].get("total")
                  if not downloads:
                      print(f"::warning::No download totals in API response for {package}")
                      continue
                  favers = api_data["package"].get("favers", 0)

                  total = downloads["total"]
                  monthly = downloads["monthly"]
                  daily = downloads["daily"]

                  # Load existing data
                  json_path = os.path.join(folder, "packagist.json")
                  existing = {}
                  if os.path.exists(json_path):
                      try:
                          with open(json_path) as f:
                              old_data = json.load(f)
                          for entry in old_data.get("daily", []):
                              existing[entry["date"]] = entry
                      except (json.JSONDecodeError, KeyError) as e:
                          print(f"::warning::Corrupt data file for {package}, starting fresh: {e}")
                          existing = {}

                  # Add today's snapshot
                  existing[today] = {
                      "date": today,
                      "total": total,
                      "monthly": monthly,
                      "daily": daily,
                      "favers": favers,
                  }

                  # Sort by date descending (most recent first)
                  merged = sorted(existing.values(), key=lambda x: x["date"], reverse=True)

                  result_data = {
                      "schema_version": 1,
                      "latest": {
                          "total": total,
                          "monthly": monthly,
                          "daily": daily,
                          "favers": favers,
                      },
                      "daily": merged,
                  }

                  os.makedirs(folder, exist_ok=True)
                  tmp_path = os.path.join(folder, ".packagist.tmp")
                  with open(tmp_path, "w") as f:
                      json.dump(result_data, f, indent=2)
                      f.write("\n")
                  os.replace(tmp_path, json_path)

                  days_tracked = len(merged)
                  print(f"{folder}: {total} total downloads, {monthly} monthly, {daily} daily, {favers} favers | {days_tracked} days tracked")

              except Exception as e:
                  print(f"::warning::Failed to process {package}: {e}")
                  continue
          PYTHON

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add */packagist.json
          git diff --staged --quiet && echo "No changes" && exit 0
          today=$(date -u +%Y-%m-%d)
          git commit -m "Update Packagist data ${today}"
          for i in 1 2 3; do
            if git pull --rebase; then
              git push && exit 0
            else
              echo "::warning::Rebase failed (possible conflict), aborting rebase"
              git rebase --abort 2>/dev/null || true
            fi
            echo "::warning::Push attempt $i failed, retrying..."
            sleep 5
          done
          echo "::error::Failed to push after 3 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        run: echo "::warning::Packagist collection failed. Check the workflow logs."
